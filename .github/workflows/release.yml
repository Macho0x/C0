name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache-dependency-path: src/go.sum

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux (amd64)
        run: |
          cd src
          go build -o c0-linux-amd64 -ldflags="-s -w" ./cmd/c0

      - name: Build macOS (amd64)
        run: |
          cd src
          GOOS=darwin GOARCH=amd64 go build -o c0-darwin-amd64 -ldflags="-s -w" ./cmd/c0

      - name: Build macOS (arm64)
        run: |
          cd src
          GOOS=darwin GOARCH=arm64 go build -o c0-darwin-arm64 -ldflags="-s -w" ./cmd/c0

      - name: Build Windows (amd64)
        run: |
          cd src
          GOOS=windows GOARCH=amd64 go build -o c0-windows-amd64.exe -ldflags="-s -w" ./cmd/c0

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: C0 ${{ steps.version.outputs.version }}
          body_path: VERSION
          files: |
            src/c0-linux-amd64
            src/c0-darwin-amd64
            src/c0-darwin-arm64
            src/c0-windows-amd64.exe
