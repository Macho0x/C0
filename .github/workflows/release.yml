name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build Linux (amd64)
        run: |
          cd src
          go build -o goop-linux-amd64 -ldflags="-s -w" ./cmd/goop

      - name: Build macOS (amd64)
        run: |
          cd src
          GOOS=darwin GOARCH=amd64 go build -o goop-darwin-amd64 -ldflags="-s -w" ./cmd/goop

      - name: Build macOS (arm64)
        run: |
          cd src
          GOOS=darwin GOARCH=arm64 go build -o goop-darwin-arm64 -ldflags="-s -w" ./cmd/goop

      - name: Build Windows (amd64)
        run: |
          cd src
          GOOS=windows GOARCH=amd64 go build -o goop-windows-amd64.exe -ldflags="-s -w" ./cmd/goop

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Goop ${{ steps.version.outputs.version }}
          body_path: RELEASE_NOTES.md
          files: |
            src/goop-linux-amd64
            src/goop-darwin-amd64
            src/goop-darwin-arm64
            src/goop-windows-amd64.exe
