name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: src/go.mod
          cache-dependency-path: src/go.sum

      - name: Go unit tests
        run: go test ./...

      - name: Build
        run: go build -o /tmp/c0 ./cmd/c0

      - name: End-to-end tests
        run: |
          /tmp/c0 test ../tests/
